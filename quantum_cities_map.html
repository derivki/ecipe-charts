  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #fff; }
    #map { width: 100%; height: 100vh; min-height: 500px; }

    .map-controls {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 1000;
      display: flex; gap: 6px;
    }
    .map-btn {
      background: white;
      border: 1px solid #aaa;
      border-radius: 4px;
      padding: 6px 13px;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
      color: #333;
    }
    .map-btn:hover { background: #f0f0f0; }

    .legend {
      position: absolute;
      bottom: 32px; right: 10px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 11px 15px;
      font-size: 12px;
      z-index: 1000;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      min-width: 175px;
    }
    .legend h4 {
      margin-bottom: 9px;
      font-size: 12px;
      font-weight: 600;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .legend-section { margin-bottom: 10px; }
    .legend-section-title {
      font-size: 11px;
      color: #777;
      margin-bottom: 5px;
      font-style: italic;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      gap: 8px;
      color: #444;
    }
    .legend-dot {
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(0,0,0,0.2);
    }
    .leaflet-tooltip {
      font-size: 13px;
      line-height: 1.5;
      padding: 7px 10px;
    }
    .leaflet-tooltip strong {
      font-size: 14px;
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>

    }).addTo(map);

    const SCALE = 1.5;

    cities.forEach(([name, lat, lng, inst, collab, startups]) => {
      const r = Math.max(4, Math.sqrt(collab) * SCALE);
      const hasStartups = startups > 0;
      const fillColor  = hasStartups ? '#2196A6' : '#9E9E9E';
      const edgeColor  = hasStartups ? '#166d78' : '#6b6b6b';

      const marker = L.circleMarker([lat, lng], {
        radius: r,
        fillColor: fillColor,
        color: edgeColor,
        weight: 1,
        fillOpacity: 0.65,
        interactive: true
      });
