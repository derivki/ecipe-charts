<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quantum innovation hubs — cluster ranking</title>
<script src="assets/vendor/d3.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">ECIPE Quantum Technologies Tracker</div>
  <div class="nav">
    <a href="index.html">Overview</a>
    <a href="countries.html">Countries</a>
    <a href="clusters.html" class="on">Clusters</a>
  </div>
  <h1>Innovation hubs — the 45 quantum clusters</h1>
  <p class="sub">Ranked on Market Orientation, Collaboration Intensity and Ecosystem Maturity (ECIPE Occasional Paper 15/2025).</p>
  <div class="vintage" id="vintage"></div>

  <div class="dash">
    <div class="panel span2" id="p-rank"></div>
    <div class="panel" id="p-stress"></div>
    <div class="panel" id="p-collab"></div>
  </div>
</div>

<script src="assets/theme.js"></script>
<script src="assets/chart-template.js"></script>
<script src="assets/charts/clusters.js"></script>
<script>
  QT.injectCSS();
  QT.loadData("manifest").then(m => QT.vintage("#vintage", m)).catch(() => {});
  QT.charts.clusterRanking("#p-rank", { compact: true, title: "Full ranking (click a column to sort)" });
  QT.charts.clusterStressTest("#p-stress", { compact: true, top: 12, title: "Stress-test the ranking" });
  QT.charts.clusterCollaboration("#p-collab", { compact: true, title: "Collaboration intensity" });
</script>
</body>
</html>
