<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ECIPE Quantum Technologies Tracker</title>
<script src="assets/vendor/d3.min.js"></script>
<style>
  .links{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px;}
  .links a{font-size:12.5px;text-decoration:none;color:var(--ink);border:1px solid var(--line);
    background:var(--panel);border-radius:8px;padding:8px 12px;transition:.12s;}
  .links a:hover{border-color:#b9c1cb;}
  .links a b{color:var(--muted);font-weight:500;}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">ECIPE Quantum Technologies Tracker</div>
  <h1>The global quantum landscape</h1>
  <p class="sub">Announced funding, companies and collaboration across the quantum economy — the state of play, from the ECIPE Quantum Database.</p>
  <div class="vintage" id="vintage"></div>

  <div id="kpis"></div>

  <div class="dash">
    <div class="panel span2" id="p-funding"></div>
    <div class="panel" id="p-country"></div>
    <div class="panel" id="p-cluster"></div>
  </div>

  <div class="links">
    <a href="funding_by_country.html"><b>Explore →</b> Funding by country</a>
    <a href="funding_by_instrument.html"><b>Explore →</b> Funding by instrument</a>
    <a href="funding_by_stage.html"><b>Explore →</b> Funding by stage</a>
  </div>
</div>

<script src="assets/theme.js"></script>
<script src="assets/chart-template.js"></script>
<script src="assets/charts/overview_kpis.js"></script>
<script src="assets/charts/cluster_concentration.js"></script>
<script src="assets/charts/funding_by_instrument.js"></script>
<script src="assets/charts/funding_by_country.js"></script>
<script>
  QT.injectCSS();
  QT.loadData("manifest").then(m => QT.vintage("#vintage", m)).catch(() => {});
  QT.charts.overviewStats("#kpis");
  QT.charts.fundingByInstrument("#p-funding", { compact: true, title: "Funding over time, by source of capital" });
  QT.charts.fundingByCountry("#p-country", { compact: true, top: 12, title: "Where the capital is — top countries" });
  QT.charts.clusterConcentration("#p-cluster", { compact: true, title: "Funding concentrates in clusters" });
</script>
</body>
</html>
